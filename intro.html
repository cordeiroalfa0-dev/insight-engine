<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Games Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100vh;
    font-family: 'VT323', monospace;
    cursor: none;
  }

  /* VIDEO DE FUNDO */
  #bgVideo {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0;
    animation: videoFadeIn 2s ease 0.5s forwards;
  }

  @keyframes videoFadeIn {
    to { opacity: 1; }
  }

  /* CAMADAS DE EFEITO */
  .layer-dark {
    position: fixed; inset: 0; z-index: 1;
    background: rgba(0, 0, 10, 0.65);
  }

  .layer-vignette {
    position: fixed; inset: 0; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
  }

  /* SCANLINES CRT */
  .scanlines {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0, 0, 0, 0.18) 3px,
      rgba(0, 0, 0, 0.18) 4px
    );
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* LINHA DE SCAN ANIMADA */
  .scan-sweep {
    position: fixed; left: 0; right: 0; z-index: 4;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.4), transparent);
    animation: sweep 4s linear infinite;
    pointer-events: none;
  }
  @keyframes sweep {
    0% { top: -2px; opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  /* GLITCH OVERLAY */
  .glitch-overlay {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    opacity: 0;
    animation: glitchFlash 6s ease 3s infinite;
  }
  @keyframes glitchFlash {
    0%,100% { opacity: 0; }
    2% { opacity: 0.05; background: rgba(0,229,255,0.1); transform: translateX(-2px); }
    4% { opacity: 0; }
    6% { opacity: 0.03; background: rgba(224,64,251,0.08); transform: translateX(2px); }
    8% { opacity: 0; }
  }

  /* CONTAINER PRINCIPAL */
  .intro-container {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: 20px;
  }

  /* LOGO TOPO */
  .logo-top {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 20;
    opacity: 0;
    animation: fadeSlideDown 0.8s ease 1s forwards;
  }
  .logo-top-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; color: rgba(0,229,255,0.5);
    letter-spacing: 4px;
  }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CONTEÚDO CENTRAL */
  .center-content {
    text-align: center;
    position: relative;
  }

  /* LINHA DECORATIVA TOPO */
  .deco-line-top {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #00e5ff, #e040fb, transparent);
    margin: 0 auto 10px;
    animation: lineExpand 0.8s ease 1.5s forwards;
  }
  @keyframes lineExpand {
    to { width: 400px; }
  }

  /* SUBTÍTULO */
  .subtitle {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px; color: #e040fb;
    letter-spacing: 6px;
    opacity: 0; margin-bottom: 16px;
    text-shadow: 0 0 20px #e040fb;
    animation: fadeUp 0.6s ease 2s forwards;
  }

  /* TITULO PRINCIPAL */
  .main-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 1.6vw, 16px);
    line-height: 1.4;
    opacity: 0;
    animation: titleReveal 0.8s ease 2.4s forwards;
    position: relative;
  }
  .main-title .word1 { color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.3); display: block; }
  .main-title .word2 { color: #00e5ff; text-shadow: 0 0 40px #00e5ff, 0 0 80px rgba(0,229,255,0.3); display: block; }
  .main-title .word3 { color: #e040fb; text-shadow: 0 0 40px #e040fb, 0 0 80px rgba(224,64,251,0.3); display: block; }

  @keyframes titleReveal {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* GLITCH NO TÍTULO */
  .main-title::before {
    content: attr(data-text);
    position: absolute; inset: 0;
    color: #00e5ff; opacity: 0;
    animation: titleGlitch 5s ease 4s infinite;
    clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
  }
  @keyframes titleGlitch {
    0%,100% { opacity: 0; transform: none; }
    92% { opacity: 0; }
    93% { opacity: 0.8; transform: translateX(-4px); }
    94% { opacity: 0; transform: translateX(4px); }
    96% { opacity: 0.5; transform: translateX(-2px); }
    97% { opacity: 0; }
  }

  /* LINHA DECORATIVA BAIXO */
  .deco-line-bottom {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #e040fb, #00e5ff, transparent);
    margin: 8px auto 10px;
    animation: lineExpand 0.8s ease 3s forwards;
  }

  /* CRÉDITOS / VERSÃO */
  .version-badge {
    display: inline-flex; align-items: center; gap: 10px;
    opacity: 0;
    animation: fadeUp 0.6s ease 3.2s forwards;
  }
  .version-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #00e676;
    box-shadow: 0 0 8px #00e676;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  .version-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
  }

  /* BOTÃO ENTRAR */
  .enter-btn {
    margin-top: 10px; opacity: 0;
    animation: fadeUp 0.6s ease 3.8s forwards;
  }
  .enter-btn button {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; letter-spacing: 2px;
    color: #000; background: #00e5ff;
    border: none; padding: 10px 32px;
    border-radius: 3px; cursor: pointer;
    box-shadow: 0 0 30px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.2);
    transition: all 0.2s;
    animation: btnPulse 2s ease 4.5s infinite;
  }
  .enter-btn button:hover {
    background: #fff;
    box-shadow: 0 0 50px rgba(0,229,255,0.8), 0 0 100px rgba(0,229,255,0.4);
    transform: scale(1.05);
  }
  .enter-btn button:active { transform: scale(0.97); }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 0 30px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.2); }
    50% { box-shadow: 0 0 50px rgba(0,229,255,0.8), 0 0 100px rgba(0,229,255,0.4); }
  }

  /* INSERT COIN */
  .insert-coin {
    display: none;
  }
  .insert-coin-text {
    display: none;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* CANTOS DECORATIVOS */
  .corner {
    position: fixed; z-index: 20; width: 40px; height: 40px;
    opacity: 0; animation: fadeIn 0.5s ease 1.2s forwards;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 16px; left: 16px; }
  .corner-tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner-bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner-br { bottom: 16px; right: 16px; transform: scale(-1); }

  @keyframes fadeIn { to { opacity: 1; } }

  /* PARTÍCULAS */
  .particle {
    position: fixed; pointer-events: none; z-index: 8;
    width: 2px; height: 2px; border-radius: 50%;
    background: #00e5ff;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* TELA DE SAÍDA */
  #exitOverlay {
    position: fixed; inset: 0; z-index: 100;
    background: #000; opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #exitOverlay.active { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<!-- VÍDEO DE FUNDO -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="intro_bg.mp4" type="video/mp4">
</video>

<!-- CAMADAS -->
<div class="layer-dark"></div>
<div class="layer-vignette"></div>
<div class="scanlines"></div>
<div class="scan-sweep"></div>
<div class="glitch-overlay"></div>

<!-- CANTOS DECORATIVOS -->
<div class="corner corner-tl">
  <svg viewBox="0 0 40 40" fill="none">
    <polyline points="40,2 2,2 2,40" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
    <polyline points="40,8 8,8 8,40" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  </svg>
</div>
<div class="corner corner-tr">
  <svg viewBox="0 0 40 40" fill="none">
    <polyline points="40,2 2,2 2,40" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  </svg>
</div>
<div class="corner corner-bl">
  <svg viewBox="0 0 40 40" fill="none">
    <polyline points="40,2 2,2 2,40" stroke="#e040fb" stroke-width="1.5" opacity="0.6"/>
  </svg>
</div>
<div class="corner corner-br">
  <svg viewBox="0 0 40 40" fill="none">
    <polyline points="40,2 2,2 2,40" stroke="#e040fb" stroke-width="1.5" opacity="0.6"/>
  </svg>
</div>

<!-- LOGO TOPO -->
<div class="logo-top">
  <div class="logo-top-text">DEV EMERSON 2026</div>
</div>

<!-- CONTEÚDO CENTRAL -->
<div class="intro-container">
  <div class="center-content">
    <div class="deco-line-top"></div>
    
    <div class="main-title" data-text="MASTER GAMES ARCADE">
      <span style="display:inline; color:#fff; text-shadow:0 0 30px rgba(255,255,255,0.3);">MASTER </span><span style="display:inline; color:#00e5ff; text-shadow:0 0 40px #00e5ff;">GAMES </span><span style="display:inline; color:#e040fb; text-shadow:0 0 40px #e040fb;">ARCADE</span>
    </div>
    <div class="deco-line-bottom"></div>
    
    <div class="enter-btn">
      <button onclick="enterLauncher()">▶ &nbsp; INSERIR FICHA</button>
    </div>
  </div>
</div>

<!-- INSERT COIN -->
<div class="insert-coin">
  <div class="insert-coin-text">★ &nbsp; PRESSIONE QUALQUER TECLA &nbsp; ★</div>
</div>

<!-- OVERLAY DE SAÍDA -->
<div id="exitOverlay"></div>

<script>
  // PARTÍCULAS FLUTUANTES
  function createParticles() {
    const colors = ['#00e5ff','#e040fb','#00e676'];
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random()*100}vw;
        animation-duration: ${6 + Math.random()*10}s;
        animation-delay: ${Math.random()*8}s;
        --drift: ${(Math.random()-0.5)*100}px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        box-shadow: 0 0 4px ${colors[Math.floor(Math.random()*colors.length)]};
        width: ${1 + Math.random()*2}px;
        height: ${1 + Math.random()*2}px;
      `;
      document.body.appendChild(p);
    }
  }
  createParticles();

  // ENTRAR NO LAUNCHER
  function enterLauncher() {
    const overlay = document.getElementById('exitOverlay');
    overlay.classList.add('active');
    setTimeout(() => {
      window.location.href = 'http://localhost:8080';
    }, 700);
  }

  // QUALQUER TECLA ENTRA
  let canEnter = false;
  setTimeout(() => { canEnter = true; }, 4000);
  document.addEventListener('keydown', () => {
    if (canEnter) enterLauncher();
  });

  // CURSOR PERSONALIZADO
  const cursor = document.createElement('div');
  cursor.style.cssText = `
    position: fixed; z-index: 9999; pointer-events: none;
    width: 8px; height: 8px; border-radius: 50%;
    background: #00e5ff;
    box-shadow: 0 0 10px #00e5ff;
    transform: translate(-50%, -50%);
    transition: width 0.1s, height 0.1s;
  `;
  document.body.appendChild(cursor);
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
</script>
</body>
</html>
